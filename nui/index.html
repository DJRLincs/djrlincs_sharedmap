<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DJRLincs Shared Map</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent !important;
      }
      /* CRITICAL: Hide everything by default until NUI message opens it */
      #root {
        width: 100%;
        height: 100%;
        display: none;
        visibility: hidden;
        background: transparent;
      }
      #root.visible {
        display: block;
        visibility: visible;
      }
    </style>
    <script type="module" crossorigin src="./assets/index.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
